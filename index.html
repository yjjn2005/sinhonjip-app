    function parseXmlResponse(xml) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, 'text/xml');
      const items = Array.from(doc.getElementsByTagName('item'));
      const result = [];
      items.forEach(item => {
        const get = (tag) => {
          const el = item.getElementsByTagName(tag)[0];
          return el ? el.textContent.trim() : '';
        };
        // API 응답은 영문 태그명 사용: aptNm, umdNm, excluUseAr, deposit, monthlyRent, floor, buildYear, dealYear, dealMonth, dealDay

          dong: get('umdNm'),
          area: parseFloat(get('excluUseAr') || '0') || 0,
          deposit: parseInt((get('deposit') || '0').replace(/,/g, '')) || 0,

          dealMonth: (get('dealMonth') || '').padStart(2, '0'),
          dealDay: (get('dealDay') || '').padStart(2, '0'),
          type: rent > 0 ? '월세' : '전세',
        });
      });
      return result.filter(r => r.aptName && r.aptName.trim() !== '');

    function stringSimilarity(a, b) {
      if (!a || !b) return 0;
      const setA = new Set(a.split(''));
      const setB = new Set(b.split(''));
      const intersection = new Set([...setA].filter(x => setB.has(x)));
      const union = new Set([...setA, ...setB]);
      return intersection.size / union.size;
    }
    function deduplicateListings(listings) {
      const groups = new Map();
      listings.forEach(item => {
        const exactKey = `${item.aptName}_${item.dong}_${Math.round(item.area)}_${item.deposit}`;
        if (groups.has(exactKey)) {
          groups.get(exactKey).count += 1;
          return;
        }
        let merged = false;
        for (const [key, group] of groups) {
          const rep = group.rep;
          const nameSim = stringSimilarity(item.aptName, rep.aptName);
          const areaDiff = Math.abs(item.area - rep.area);
          const depositDiff = Math.abs(item.deposit - rep.deposit);
          if (nameSim >= 0.85 && areaDiff <= 2 && depositDiff <= 100) {
            group.count += 1;
            if ((item.dealYear + item.dealMonth + item.dealDay) >
                (rep.dealYear + rep.dealMonth + rep.dealDay)) {
              group.rep = item;
            }
            merged = true;
            break;
          }
        }
        if (!merged) {
          groups.set(exactKey, { rep: item, count: 1 });
        }
      });
      return Array.from(groups.values()).map(g => ({
        ...g.rep,
        brokerCount: g.count,
      }));

    function getTransit(dong) {
      if (!dong) return { s: 30, m: 30 };
      // 숫자/가나다 제거 후 동 이름 매칭
      const clean = dong.replace(/\d+[가-힣]?$/g, '').replace(/동$/,'').trim();
      for (const [key, val] of Object.entries(TRANSIT_MAP)) {
        if (clean.includes(key) || key.includes(clean.slice(0, 2))) return val;
      }
      return { s: 30, m: 30 }; // 기본값
    }

    function smartScore(item) {
      let score = 0;
      // ① 전세 최우선 (+100)
      if (item.type === '전세') score += 100;
      // ③ 서울시 이자지원 가능 (+50)
      if (item.deposit <= LOAN_MAX) score += 50;
      // ② 6억 근접 점수
      const diff = Math.abs(item.deposit - TARGET_DEPOSIT);
      if (diff <= 5000)       score += 40;
      else if (diff <= 10000) score += 30;
      else if (diff <= 20000) score += 18;
      else if (diff <= 30000) score += 8;
      // ④ 교통 점수 — 서울역+문정 평균 시간 기반 실계산
      const t = getTransit(item.dong);
      const avg = (t.s + t.m) / 2;
      if (avg <= 18)      score += 30;
      else if (avg <= 25) score += 22;
      else if (avg <= 30) score += 15;
      else if (avg <= 35) score += 8;
      return score;
    }

    // 보증금: 실거래가 정확 표기 → "5억 9,500만", "6억", "7억 2,000만"
    const formatPrice = (price) => {
      if (!price || price === 0) return '0';
      if (price >= 10000) {
        const uk = Math.floor(price / 10000);
        const man = price % 10000;
        if (man === 0) return `${uk}억`;
        return `${uk}억 ${man.toLocaleString()}만`;
      }
      return price.toLocaleString() + '만';
    };
    // 월이자: 만원 단위로 표시
    const formatInterest = (price) => {
      if (!price || price === 0) return '0만원';
      if (price >= 10000) {
        const uk = Math.floor(price / 10000);
        const man = price % 10000;
        if (man === 0) return `${uk}억원`;
        return `${uk}억 ${man.toLocaleString()}만원`;
      }
      return price.toLocaleString() + '만원';
    };

      function getLast6Months() {

        for (let i = 0; i < 6; i++) {
          const year = d.getFullYear();
          const month = String(d.getMonth() + 1).padStart(2, '0');

        const oldest = months[months.length - 1];
        const newest = months[0];
        const rangeLabel = `${oldest.slice(0,4)}.${oldest.slice(4)} ~ ${newest.slice(0,4)}.${newest.slice(4)}`;
        setSearchRange(rangeLabel);
        try {
          if (isInvalidKey(apiKey)) {
            setIsDemoMode(true);
            setOriginalListings(getDemoData(selectedGu, newest));
          } else {
            setIsDemoMode(false);
            try {
              // 최근 6개월 병렬 조회
              const results = await Promise.allSettled(
                months.map(m => fetchAptRent(selectedGu, m, apiKey))
              );
              const allData = [];
              results.forEach(r => {
                if (r.status === 'fulfilled' && Array.isArray(r.value)) {
                  allData.push(...r.value);
                }
              });
              if (allData.length > 0) {
                setOriginalListings(allData);
              } else {
                // 데이터 없으면 데모 데이터로 표시
                setIsDemoMode(true);
                setOriginalListings(getDemoData(selectedGu, newest));
              }
            } catch (apiErr) {
              // CORS/API 오류 시 데모 데이터로 자동 폴백
              console.warn('API 오류, 데모 데이터로 전환:', apiErr.message);
              setIsDemoMode(true);
              setOriginalListings(getDemoData(selectedGu, newest));
            }
          }
        } catch (err) {
          setError(err.message);
          setOriginalListings([]);
        } finally {
          setLoading(false);
        }
      };
      const processedData = useMemo(() => {
        if (!originalListings || originalListings.length === 0) return { listings: [], stats: {} };

        const deduped = deduplicateListings(originalListings);

        // 날짜 비교용 정수값 계산 (YYYYMMDD)
        const dateKey = (i) => {
          const y = String(i.dealYear || '0');
          const m = String(i.dealMonth || '00').padStart(2, '0');
          const d = String(i.dealDay || '00').padStart(2, '0');
          return parseInt(`${y}${m}${d}`) || 0;
        };

        if (sortOrder === 'recent') {
          // 최근순 내림차순 (거래일 최신 → 오래된 순)
          deduped.sort((a, b) => {
            const dateDiff = dateKey(b) - dateKey(a);
            if (dateDiff !== 0) return dateDiff;
            return smartScore(b) - smartScore(a); // 같은 날짜면 추천점수순
          });
        } else {
          // 추천 우선순위 정렬: ①전세 ②6억근접 ③이자지원 ④교통
          deduped.sort((a, b) => {
            const diff = smartScore(b) - smartScore(a);
            if (diff !== 0) return diff;
            return Math.abs(a.deposit - TARGET_DEPOSIT) - Math.abs(b.deposit - TARGET_DEPOSIT);
          });
        }

        const isTopItem = (i) => smartScore(i) >= 180;

        // 면적 필터 먼저 적용
        const areaFiltered = deduped.filter(i => i.area >= minArea);

        const filtered = typeFilter === '추천'
          ? areaFiltered.filter(isTopItem)
          : typeFilter === '전세'
          ? areaFiltered.filter(i => i.type === '전세')
          : typeFilter === '월세'
          ? areaFiltered.filter(i => i.type !== '전세')
          : areaFiltered; // 전체

        const topCount = areaFiltered.filter(isTopItem).length;
        const stats = {
          total: originalListings.length,
          deduped: areaFiltered.length,
          removed: originalListings.length - areaFiltered.length,
          topCount,
          jeonse: areaFiltered.filter(i => i.type === '전세').length,
          monthly: areaFiltered.filter(i => i.type !== '전세').length,
          near6Uk: topCount,
        };
        return { listings: filtered, stats };
      }, [originalListings, typeFilter, minArea, sortOrder]);
      useEffect(() => {
        handleSearch();
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);
      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-12">
          {/* 헤더 */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
            <div className="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
              <div className="flex items-center gap-2 text-blue-600">
                <Home size={24} className="stroke-[2.5]" />
                <h1 className="text-lg font-bold tracking-tight">유태현·이채린 신혼집 프로젝트</h1>
                {isDemoMode && (
                  <span className="text-[10px] font-semibold bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">데모</span>
                )}
              </div>
              <div className="flex items-center gap-1">
                <button
                  onClick={handleSearch}
                  disabled={loading}
                  className="flex items-center gap-1 px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-full transition-colors disabled:opacity-60"
                  title="실시간 시세 연동"
                >
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5.27"/></svg>
                  실시간 시세
                </button>
                <button
                  onClick={() => setShowSettings(!showSettings)}
                  className="p-2 rounded-full hover:bg-slate-100 text-slate-500 transition-colors"
                  title="설정"
                >
                  <Settings size={18} />
                </button>
              </div>
            </div>
          </header>
          <main className="max-w-5xl mx-auto px-3 pt-4 space-y-4">
            {/* 데이터 출처 안내 (항상 표시) */}
            {!loading && processedData.listings.length > 0 && (
              <div className={`px-4 py-2.5 rounded-xl text-xs flex items-start gap-2 border ${isDemoMode ? 'bg-amber-50 border-amber-200 text-amber-800' : 'bg-blue-50 border-blue-200 text-blue-800'}`}>
                <AlertCircle size={14} className="shrink-0 mt-0.5" />
                <div className="leading-relaxed">
                  {isDemoMode
                    ? <span><strong>샘플 데이터</strong> 표시 중 — 실제 데이터는 API 키 설정 후 확인 가능</span>
                    : <span>
                        <strong>국토교통부 실거래가</strong> (최근 6개월 완료된 전월세 거래 · {searchRange}) · 네이버/다방 버튼은 <strong>현재 매물 검색</strong>으로 연결됩니다<br/>
                        <span className="text-blue-600">※ 실거래가 ≠ 현재 매물가 — 임장 전 네이버 현재 호가 반드시 확인하세요</span>
                      </span>
                  }
                </div>
              </div>
            )}
            {/* 설정 패널 */}
            {showSettings && (
              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <h2 className="text-sm font-semibold flex items-center gap-2 mb-3">
                  <Key size={16} className="text-slate-500"/> API 키 설정
                </h2>
                <p className="text-xs text-slate-500 mb-3 leading-relaxed">
                  공공데이터포털의 <strong>'국토교통부_아파트전월세 자료'</strong> 인증키를 입력하세요.<br/>
                  비워두면 <strong>샘플 데이터</strong>로 작동합니다.
                </p>
                <input
                  type="text"
                  value={apiKey}
                  onChange={handleSaveApiKey}
                  placeholder="발급받은 인증키를 입력하세요"
                  className="w-full text-sm p-3 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                />
              </div>
            )}
            {/* 검색 패널 */}
            <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
              <div className="grid grid-cols-2 gap-3">
                {/* 자치구 선택 */}
                <div className="space-y-1">
                  <label className="text-xs font-semibold text-slate-500 flex items-center gap-1">
                    <MapPin size={12} /> 자치구
                  </label>
                  <select
                    value={selectedGu}
                    onChange={(e) => setSelectedGu(e.target.value)}
                    className="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                  >
                    {Object.entries(SEOUL_GU).map(([guName, code]) => (
                      <option key={code} value={code}>{guName}</option>
                    ))}
                  </select>
                </div>
                {/* 조회 범위 표시 */}
                <div className="space-y-1">
                  <label className="text-xs font-semibold text-slate-500 flex items-center gap-1">
                    <Calendar size={12} /> 조회 범위
                  </label>
                  <div className="w-full p-2.5 bg-blue-50 border border-blue-200 rounded-lg text-sm text-blue-700 font-semibold flex items-center gap-1.5">
                    <span className="text-blue-500">📅</span>
                    {searchRange || '최근 6개월 자동'}

                </div>
              </div>
              {/* 전용면적 필터 */}
              <div className="mt-3">
                <label className="text-xs font-semibold text-slate-500 flex items-center gap-1 mb-1.5">
                  <Building2 size={12} /> 전용면적 (㎡ 이상)
                </label>
                <div className="flex gap-2">
                  {[
                    { label: '전체', val: 0 },
                    { label: '59㎡~', val: 59 },
                    { label: '74㎡~', val: 74 },
                    { label: '84㎡~', val: 84 },
                  ].map(opt => (
                    <button key={opt.val} onClick={() => setMinArea(opt.val)}
                      className={`flex-1 py-2 rounded-lg text-xs font-bold border transition-colors ${
                        minArea === opt.val
                          ? 'bg-blue-600 text-white border-blue-600'

                      {opt.label}
                    </button>

              </div>
              {/* 조회 버튼 */}
              <button
                onClick={handleSearch}
                disabled={loading}
                className="w-full mt-3 h-11 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold rounded-xl flex items-center justify-center gap-2 transition-colors disabled:opacity-70"
              >
                {loading ? (
                  <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                ) : (
                  <><Zap size={16} /> 매물 조회</>
                )}
              </button>
            </div>
            {/* 에러 메시지 */}
            {error && (
              <div className="bg-red-50 text-red-700 p-4 rounded-xl flex items-start gap-3 border border-red-100">
                <AlertCircle size={20} className="shrink-0 mt-0.5" />
                <p className="text-sm leading-relaxed">{error}</p>
              </div>
            )}
            {/* 결과 요약 */}
            {!loading && !error && processedData.listings.length > 0 && (
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div className="bg-white p-4 rounded-xl border border-slate-200 text-center shadow-sm">
                  <div className="text-xs text-slate-500 mb-1">총 수집 매물</div>
                  <div className="text-xl font-bold">{processedData.stats.total}건</div>
                </div>
                <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 text-center shadow-sm">
                  <div className="text-xs text-blue-600 font-medium mb-1 flex items-center justify-center gap-1">
                    <Layers size={14} /> 중복 제거됨
                  </div>
                  <div className="text-xl font-bold text-blue-700">-{processedData.stats.removed}건</div>
                </div>
                <div className="bg-white p-4 rounded-xl border border-slate-200 text-center shadow-sm">
                  <div className="text-xs text-slate-500 mb-1">최종 고유 매물</div>
                  <div className="text-xl font-bold">{processedData.stats.deduped}건</div>
                </div>
                <button
                  onClick={() => setTypeFilter('추천')}
                  className={`p-4 rounded-xl border text-center shadow-sm transition-all ${typeFilter === '추천' ? 'bg-green-500 border-green-500' : 'bg-green-50 border-green-200 hover:bg-green-100'}`}
                >
                  <div className={`text-xs font-bold mb-1 ${typeFilter === '추천' ? 'text-white' : 'text-green-700'}`}>🎯 최우선 추천</div>
                  <div className={`text-xl font-bold ${typeFilter === '추천' ? 'text-white' : 'text-green-800'}`}>{processedData.stats.topCount}건</div>
                </button>
              </div>
            )}
            {/* 정렬 토글 */}
            {!loading && !error && processedData.stats.deduped > 0 && (
              <div className="flex gap-2 justify-end">
                <button
                  onClick={() => setSortOrder('recent')}
                  className={`px-3 py-1.5 rounded-full text-xs font-bold border transition-all ${sortOrder === 'recent' ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-500 border-slate-300 hover:bg-slate-50'}`}
                >
                  📅 최근순
                </button>
                <button
                  onClick={() => setSortOrder('score')}
                  className={`px-3 py-1.5 rounded-full text-xs font-bold border transition-all ${sortOrder === 'score' ? 'bg-green-600 text-white border-green-600' : 'bg-white text-slate-500 border-slate-300 hover:bg-slate-50'}`}
                >
                  🎯 추천순
                </button>
              </div>
            )}
            {/* 매물 유형 필터 버튼 */}
            {!loading && !error && processedData.stats.deduped > 0 && (
              <div className="flex gap-2">
                {[
                  { label: '전체', count: processedData.stats.deduped, value: '전체', color: 'slate' },
                  { label: '전세', count: processedData.stats.jeonse, value: '전세', color: 'indigo' },
                  { label: '월세', count: processedData.stats.monthly, value: '월세', color: 'orange' },
                ].map(btn => {
                  const active = typeFilter === btn.value;
                  const colorMap = {
                    slate:  active ? 'bg-slate-700 text-white border-slate-700' : 'bg-white text-slate-600 border-slate-200',
                    indigo: active ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-indigo-600 border-indigo-200',
                    orange: active ? 'bg-orange-500 text-white border-orange-500' : 'bg-white text-orange-600 border-orange-200',
                  };
                  return (
                    <button key={btn.value} onClick={() => setTypeFilter(btn.value)}
                      className={`flex-1 py-2.5 rounded-xl text-xs font-bold border transition-all ${colorMap[btn.color]}`}>
                      <div>{btn.label}</div>
                      <div className="text-base font-extrabold">{btn.count}건</div>
                    </button>
                  );
                })}
              </div>
            )}
            {/* 매물 리스트 */}
            {!loading && !error && processedData.listings.length > 0 && (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {processedData.listings.map((item, idx) => {
                  const isLoanEligible = checkLoanEligibility(item.deposit);
                  const loanAmount = isLoanEligible ? item.deposit * 0.8 : 0;
                  const monthlyInterest = isLoanEligible ? calcMonthlyInterest(loanAmount) : 0;
                  const score = smartScore(item);
                  const transit = getTransit(item.dong);
                  const isTop = score >= 180; // 전세+이자지원+6억근접 모두 충족
                  const depositDiff = Math.abs(item.deposit - TARGET_DEPOSIT);
                  return (
                    <div key={idx} className={`bg-white rounded-xl border overflow-hidden active:shadow-md transition-shadow flex flex-col ${isTop ? 'border-green-400 ring-2 ring-green-200' : 'border-slate-200'}`}>
                      <div className="px-4 pt-3 pb-2 border-b border-slate-100">
                        <div className="flex justify-between items-center mb-1.5">
                          <div className="flex items-center gap-1">
                            <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${item.type === '전세' ? 'bg-indigo-100 text-indigo-700' : 'bg-orange-100 text-orange-700'}`}>
                              {item.type}
                            </span>
                            {isTop && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-green-500 text-white">🎯 추천</span>}
                            {depositDiff <= 10000 && !isTop && item.type === '전세' && isLoanEligible && (
                              <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-blue-100 text-blue-700">6억근접</span>
                            )}
                          </div>
                          {item.brokerCount > 1 && (
                            <span className="text-[10px] font-medium px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 flex items-center gap-0.5">
                              <Layers size={9} /> {item.brokerCount}건 통합
                            </span>
                          )}
                        </div>
                        <h3 className="font-bold text-base text-slate-800 truncate" title={item.aptName}>
                          {item.aptName}
                        </h3>
                        <p className="text-xs text-slate-400 flex items-center gap-0.5 mt-0.5">
                          <MapPin size={11} /> {item.dong}
                        </p>
                      </div>
                      <div className="px-4 py-3 flex-1">
                        <div className="flex items-baseline gap-1.5 mb-1">
                          <span className="text-xs text-slate-400">보증금</span>
                          <span className="text-xl font-extrabold text-slate-900">
                            {formatPrice(item.deposit)}
                          </span>
                        </div>
                        {item.monthlyRent > 0 && (
                          <div className="flex items-baseline gap-1.5 mb-2">
                            <span className="text-xs text-slate-400">월세</span>
                            <span className="text-base font-bold text-orange-600">{formatPrice(item.monthlyRent)}</span>
                          </div>
                        )}
                        <div className="flex flex-wrap gap-x-3 gap-y-1 text-xs text-slate-500 mt-1">
                          <span className="flex items-center gap-1"><Building2 size={12} />{item.area}㎡</span>
                          <span className="flex items-center gap-1"><Layers size={12} />{item.floor}층</span>
                          <span className="flex items-center gap-1"><Calendar size={12} />{item.buildYear}년식</span>
                          <span>계약 {item.dealMonth}.{item.dealDay}</span>
                        </div>
                        {/* 대중교통 소요시간 요약 */}
                        <div className="flex gap-2 mt-2">
                          <div className={`flex-1 flex items-center justify-center gap-1 text-[11px] font-bold px-2 py-1 rounded-lg ${transit.s <= 20 ? 'bg-green-100 text-green-800' : transit.s <= 30 ? 'bg-blue-100 text-blue-800' : 'bg-slate-100 text-slate-600'}`}>
                            🚇 서울역 <span className="text-sm font-extrabold">약 {transit.s}분</span>
                          </div>
                          <div className={`flex-1 flex items-center justify-center gap-1 text-[11px] font-bold px-2 py-1 rounded-lg ${transit.m <= 15 ? 'bg-green-100 text-green-800' : transit.m <= 25 ? 'bg-blue-100 text-blue-800' : 'bg-slate-100 text-slate-600'}`}>
                            🏢 문정역 <span className="text-sm font-extrabold">약 {transit.m}분</span>
                          </div>
                        </div>
                      </div>
                      <div className="px-4 py-2 bg-slate-50 border-t border-slate-100">
                        {isLoanEligible ? (
                          <div className="flex flex-col gap-0.5">
                            <div className="text-xs font-semibold text-green-700 flex items-center gap-1">

                      </div>
                      {/* 매물 검색 + 교통 버튼 */}
                      <div className="px-3 pb-3 pt-2 flex flex-col gap-2">
                        {/* 현재 매물 검색 — 네이버 + 다방 */}
                        <div className="grid grid-cols-2 gap-1.5">
                          <a href={naverLandUrl(item.aptName)} target="_blank" rel="noopener noreferrer"

            {!loading && !error && processedData.listings.length === 0 && (
              <div className="text-center py-16 text-slate-500 bg-white rounded-xl border border-slate-200">
                <Building2 size={40} className="mx-auto text-slate-300 mb-3" />
                <p className="font-medium">최근 6개월 실거래 내역이 없습니다.</p>
                <p className="text-sm mt-1 text-slate-400">다른 자치구 또는 면적 조건을 조정해보세요.</p>
              </div>
            )}
            {loading && (
              <div className="text-center py-16">
                <div className="w-10 h-10 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-3" />
                <p className="text-sm text-slate-500 font-semibold">최근 6개월 실거래 데이터 조회 중...</p>
                <p className="text-xs text-slate-400 mt-1">국토교통부 API 6회 병렬 호출 중입니다</p>
              </div>
            )}
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
