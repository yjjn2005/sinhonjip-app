        const text = await res.text();

          const msg = text.match(/<returnAuthMsg>(.*?)<\/returnAuthMsg>/)?.[1] || '인증 오류';
          throw new Error(`API 인증 실패: ${msg}`);
        }
        return text;
      };

      try {
        const text = await tryFetch(BASE);
        const parsed = parseXmlResponse(text);
        if (parsed.length > 0) return parsed;
      } catch (e1) {
        console.warn('직접 호출 실패, 프록시 시도:', e1.message);
      }

      // 2차: CORS 프록시
      try {
        const proxy = 'https://corsproxy.io/?' + encodeURIComponent(BASE);
        const text = await tryFetch(proxy);
        const parsed = parseXmlResponse(text);
        if (parsed.length > 0) return parsed;
      } catch (e2) {
        console.warn('프록시 호출 실패:', e2.message);
      }

      throw new Error('API 호출 실패. 잠시 후 다시 시도해주세요.');

    function parseXmlResponse(xml) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, 'text/xml');
      const items = Array.from(doc.getElementsByTagName('item'));
      const result = [];
      items.forEach(item => {
        const get = (tag) => {
          const el = item.getElementsByTagName(tag)[0];
          return el ? el.textContent.trim() : '';
        };
        // API 응답은 영문 태그명 사용: aptNm, umdNm, excluUseAr, deposit, monthlyRent, floor, buildYear, dealYear, dealMonth, dealDay
        const rent = parseInt((get('monthlyRent') || '0').replace(/,/g, '')) || 0;
        result.push({
          aptName: get('aptNm'),
          dong: get('umdNm'),
          area: parseFloat(get('excluUseAr') || '0') || 0,
          deposit: parseInt((get('deposit') || '0').replace(/,/g, '')) || 0,
          monthlyRent: rent,
          floor: get('floor'),
          buildYear: get('buildYear'),
          dealYear: get('dealYear'),
          dealMonth: (get('dealMonth') || '').padStart(2, '0'),
          dealDay: (get('dealDay') || '').padStart(2, '0'),
          type: rent > 0 ? '월세' : '전세',
        });
      });
      return result.filter(r => r.aptName && r.aptName.trim() !== '');
    }
    function stringSimilarity(a, b) {
      if (!a || !b) return 0;
      const setA = new Set(a.split(''));
      const setB = new Set(b.split(''));
      const intersection = new Set([...setA].filter(x => setB.has(x)));
      const union = new Set([...setA, ...setB]);
      return intersection.size / union.size;
    }
    function deduplicateListings(listings) {
      const groups = new Map();
      listings.forEach(item => {
        const exactKey = `${item.aptName}_${item.dong}_${Math.round(item.area)}_${item.deposit}`;
        if (groups.has(exactKey)) {
          groups.get(exactKey).count += 1;
          return;
        }
        let merged = false;
        for (const [key, group] of groups) {
          const rep = group.rep;
          const nameSim = stringSimilarity(item.aptName, rep.aptName);
          const areaDiff = Math.abs(item.area - rep.area);
          const depositDiff = Math.abs(item.deposit - rep.deposit);
          if (nameSim >= 0.85 && areaDiff <= 2 && depositDiff <= 100) {
            group.count += 1;
            if ((item.dealYear + item.dealMonth + item.dealDay) >
                (rep.dealYear + rep.dealMonth + rep.dealDay)) {
              group.rep = item;
            }
            merged = true;
            break;
          }
        }
        if (!merged) {
          groups.set(exactKey, { rep: item, count: 1 });
        }
      });
      return Array.from(groups.values()).map(g => ({
        ...g.rep,
        brokerCount: g.count,

    function getTransit(dong) {
      if (!dong) return { s: 30, m: 30 };
      // 숫자/가나다 제거 후 동 이름 매칭
      const clean = dong.replace(/\d+[가-힣]?$/g, '').replace(/동$/,'').trim();
      for (const [key, val] of Object.entries(TRANSIT_MAP)) {
        if (clean.includes(key) || key.includes(clean.slice(0, 2))) return val;
      }
      return { s: 30, m: 30 }; // 기본값
    }

    function smartScore(item) {
      let score = 0;
      // ① 전세 최우선 (+100)
      if (item.type === '전세') score += 100;
      // ③ 서울시 이자지원 가능 (+50)
      if (item.deposit <= LOAN_MAX) score += 50;
      // ② 6억 근접 점수
      const diff = Math.abs(item.deposit - TARGET_DEPOSIT);
      if (diff <= 5000)       score += 40;
      else if (diff <= 10000) score += 30;
      else if (diff <= 20000) score += 18;
      else if (diff <= 30000) score += 8;
      // ④ 교통 점수 — 서울역+문정 평균 시간 기반 실계산
      const t = getTransit(item.dong);
      const avg = (t.s + t.m) / 2;
      if (avg <= 18)      score += 30;
      else if (avg <= 25) score += 22;
      else if (avg <= 30) score += 15;
      else if (avg <= 35) score += 8;
      return score;
    }

    // 매물 링크 함수들
    function naverLandUrl(aptName, dong) {
      // 네이버 부동산 검색 결과(현재 매물)로 바로 연결 — 동 + 아파트명으로 정확도 향상
      const name = (aptName || '')
        .replace(/[()\[\]{}·.,/\\\-]/g, ' ')
        .replace(/임대/g, '')
        .replace(/\s+/g, ' ')
        .trim();
      const dongName = (dong || '').trim();
      // "행당동 대림 e 편한세상" 형태 (지역 먼저 → 단지 매칭 정확)
      const query = (dongName + ' ' + name).trim();
      return `https://m.land.naver.com/search/result/${encodeURIComponent(query)}`;
    }
function dabangUrl(aptName, dong) {
      const name = (aptName || '').replace(/[()\[\]·\.,\s]/g, ' ').trim();
      const dongName = (dong || '').trim();
      const query = (name + ' ' + dongName).trim();
      return `https://www.dabangapp.com/search?query=${encodeURIComponent(query)}`;
    }

    // 카카오맵 경로 (출발지: 아파트동, 도착지: 서울역 or 문정동)
    function kakaoTransitUrl(dong, dest) {
      const destName = dest === 'seoul' ? '서울역' : '문정동';
      return `https://map.kakao.com/?sName=${encodeURIComponent((dong||'서울')+'아파트')}&eName=${encodeURIComponent(destName)}&service=subway`;
    }

    // 보증금: 실거래가 정확 표기 → "5억 9,500만", "6억", "7억 2,000만"
    const formatPrice = (price) => {
      if (!price || price === 0) return '0';
      if (price >= 10000) {
        const uk = Math.floor(price / 10000);
        const man = price % 10000;
        if (man === 0) return `${uk}억`;
        return `${uk}억 ${man.toLocaleString()}만`;
      }
      return price.toLocaleString() + '만';
    };
    // 월이자: 만원 단위로 표시
    const formatInterest = (price) => {
      if (!price || price === 0) return '0만원';
      if (price >= 10000) {
        const uk = Math.floor(price / 10000);
        const man = price % 10000;
        if (man === 0) return `${uk}억원`;
        return `${uk}억 ${man.toLocaleString()}만원`;
      }
      return price.toLocaleString() + '만원';
    };

      const [isDemoMode, setIsDemoMode] = useState(false);
      const [typeFilter, setTypeFilter] = useState('전체');
      const [searchRange, setSearchRange] = useState('');
      const [startYM, setStartYM] = useState('');
      const [endYM, setEndYM] = useState('');
      const [sortOrder, setSortOrder] = useState('transit'); // 'transit'(교통·전세 우선) | 'recent'

      // 최근 N개월 YYYYMM 배열 반환 (최신→과거 순)
      function getLast6Months() {
        const months = [];
        const d = new Date();
        for (let i = 0; i < 6; i++) {
          const year = d.getFullYear();
          const month = String(d.getMonth() + 1).padStart(2, '0');
          months.push(`${year}${month}`);
          d.setMonth(d.getMonth() - 1);
        }
        return months; // [202506, 202505, ..., 202501]
      }
      const handleSearch = async () => {
        setLoading(true);
        setError(null);
        let months;
        if (startYM && endYM) {
          months = [];
          const [sy, sm] = startYM.split('-').map(Number);
          const [ey, em] = endYM.split('-').map(Number);
          let cd = new Date(ey, em - 1);
          const stopDate = new Date(sy, sm - 1);
          while (cd >= stopDate) {
            const y = cd.getFullYear();
            const m = String(cd.getMonth() + 1).padStart(2, '0');
            months.push(`${y}${m}`);
            cd.setMonth(cd.getMonth() - 1);
          }
          if (months.length === 0) months = getLast6Months();
        } else {
          months = getLast6Months();
        }
        const oldest = months[months.length - 1];
        const newest = months[0];
        const rangeLabel = `${oldest.slice(0,4)}.${oldest.slice(4)} ~ ${newest.slice(0,4)}.${newest.slice(4)}`;
        setSearchRange(rangeLabel);
        // 관심 자치구(성동·은평·송파) 전체를 한 번에 조회
        try {
          const next = {};
          let demoUsed = false;
          for (const { code } of WATCHLIST_GU) {
            let data = [];
            if (isInvalidKey(apiKey)) {
              data = getDemoData(code, newest);
              demoUsed = true;
            } else {
              try {
                const results = await Promise.allSettled(
                  months.map(m => fetchAptRent(code, m, apiKey))
                );
                const allData = [];
                results.forEach(r => {
                  if (r.status === 'fulfilled' && Array.isArray(r.value)) allData.push(...r.value);
                });
                if (allData.length > 0) {
                  data = allData;
                } else {
                  data = getDemoData(code, newest);
                  demoUsed = true;
                }
              } catch (apiErr) {
                console.warn('API 오류, 데모 데이터로 전환:', apiErr.message);
                data = getDemoData(code, newest);
                demoUsed = true;
              }
            }
            next[code] = data;
          }
          setIsDemoMode(demoUsed);
          setRawByGu(next);
        } catch (err) {
          setError(err.message);
          setRawByGu({});
        } finally {
          setLoading(false);
        }
      };
      const processedData = useMemo(() => {
        // 날짜 비교용 정수값 (YYYYMMDD)
        const dateKey = (i) => {
          const y = String(i.dealYear || '0');
          const m = String(i.dealMonth || '00').padStart(2, '0');
          const d = String(i.dealDay || '00').padStart(2, '0');
          return parseInt(`${y}${m}${d}`) || 0;
        };
        // 교통 편의 점수 (서울역+문정 평균시간 낮을수록 높음)
        const transitConvD = (dong) => {
          const t = getTransit(dong);
          return 200 - (t.s + t.m); // 클수록 교통 편리
        };
        // ★ 전용 59㎡형만 (그 외 면적 전부 제외)
        const is59 = (a) => a >= 54 && a < 66;
        // 카드 안 실거래 정렬: 전세 우선 → 최근 → 보증금 높은 순
        const dealSort = (a, b) => {
          const aJ = a.type === '전세' ? 0 : 1;
          const bJ = b.type === '전세' ? 0 : 1;
          if (aJ !== bJ) return aJ - bJ;
          const dd = dateKey(b) - dateKey(a);
          if (dd !== 0) return dd;
          return b.deposit - a.deposit;
        };
        // ★ 단지(카드) 정렬: ① 전세 있는 단지 ② 교통 편리 ③ 최근 거래
        const aptSortTransit = (a, b) => {
          if (a.hasJeonse !== b.hasJeonse) return (b.hasJeonse ? 1 : 0) - (a.hasJeonse ? 1 : 0);
          const tc = transitConvD(b.dong) - transitConvD(a.dong);
          if (tc !== 0) return tc;
          return b.latest - a.latest;
        };
        const aptSortRecent = (a, b) => {
          const d = b.latest - a.latest;
          if (d !== 0) return d;
          return transitConvD(b.dong) - transitConvD(a.dong);
        };
        const aptSorter = sortOrder === 'recent' ? aptSortRecent : aptSortTransit;

        const targetGus = viewGu === '전체'
          ? WATCHLIST_GU
          : WATCHLIST_GU.filter(g => g.code === viewGu);

        let total = 0, dealTotal = 0, jeonse = 0, monthly = 0, aptTotal = 0;
        const groups = targetGus.map(g => {
          const raw = rawByGu[g.code] || [];
          total += raw.length;
          let list = deduplicateListings(raw);
          // 관심 단지 목록이 있으면 그 단지들만 필터링
          const wl = APT_WATCHLIST[g.code];
          if (wl && wl.length) list = list.filter(it => matchWatchlist(it, wl));
          // 59㎡형 + 전세 7억 이하
          list = list.filter(i => is59(i.area) && (i.type !== '전세' || i.deposit <= 70000));
          // 유형 필터
          const deals = typeFilter === '전세'
            ? list.filter(i => i.type === '전세')
            : typeFilter === '월세'
            ? list.filter(i => i.type !== '전세')
            : list;
          const guJeonse = deals.filter(i => i.type === '전세').length;
          const guMonthly = deals.filter(i => i.type !== '전세').length;
          // ★ 같은 아파트(단지명+동)끼리 묶어 한 카드에 여러 가격 표시
          const map = new Map();
          deals.forEach(d => {
            const key = normalizeName(d.aptName) + '|' + (d.dong || '');
            if (!map.has(key)) {
              map.set(key, { aptName: d.aptName, dong: d.dong, buildYear: d.buildYear, deals: [] });
            }
            map.get(key).deals.push(d);
          });
          const apts = [...map.values()].map(a => {
            a.deals.sort(dealSort);
            a.hasJeonse = a.deals.some(d => d.type === '전세');
            a.latest = Math.max(...a.deals.map(dateKey));
            a.dealCount = a.deals.reduce((s, d) => s + (d.brokerCount || 1), 0);
            // 최신 거래의 단지명/년식을 대표로 사용
            const newest = a.deals.reduce((p, c) => dateKey(c) > dateKey(p) ? c : p, a.deals[0]);
            a.aptName = newest.aptName;
            a.buildYear = newest.buildYear || a.buildYear;
            return a;
          });
          apts.sort(aptSorter);
          dealTotal += deals.length; jeonse += guJeonse; monthly += guMonthly; aptTotal += apts.length;
          return { code: g.code, name: g.name, apts, aptCount: apts.length, dealCount: deals.length, jeonse: guJeonse, monthly: guMonthly };
        });
        const shownCount = groups.reduce((s, g) => s + g.apts.length, 0);
        return { groups, shownCount, stats: { total, deduped: dealTotal, apts: aptTotal, jeonse, monthly } };
      }, [rawByGu, viewGu, typeFilter, sortOrder]);
      useEffect(() => {
        handleSearch();
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

                {isDemoMode && (

                )}
              </div>
              <div className="flex items-center gap-1">
                <button
                  onClick={handleSearch}
                  disabled={loading}
                  className="flex items-center gap-1 px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-full transition-colors disabled:opacity-60"
                  title="실시간 시세 연동"
                >
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5.27"/></svg>
                  실시간 시세

                  </label>
                  <div className="grid grid-cols-2 gap-1.5">
                    <input
                      type="month"
                      value={startYM}
                      onChange={e => setStartYM(e.target.value)}
                      max="2026-12"
                      className="w-full p-2 bg-white border border-slate-300 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                      placeholder="시작"
                    />
                    <input
                      type="month"
                      value={endYM}
                      onChange={e => setEndYM(e.target.value)}
                      max="2026-12"
                      className="w-full p-2 bg-white border border-slate-300 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                      placeholder="종료"
                    />
                  </div>
                  {searchRange && (
                    <div className="text-[10px] text-blue-600 font-semibold flex items-center gap-1 mt-0.5">
                      📅 현재 적용: {searchRange}
                    </div>
                  )}
                </div>
              </div>
              {/* 전용면적: 59㎡형 고정 */}
              <div className="mt-3">
                <label className="text-xs font-semibold text-slate-500 flex items-center gap-1 mb-1.5">
                  <Building2 size={12} /> 전용면적
                </label>
                <div className="flex items-center gap-2 px-3 py-2 rounded-lg bg-blue-600 text-white text-xs font-bold">
                  <Building2 size={14} /> 전용 59㎡형만 표시 (그 외 면적 제외)
                </div>
              </div>
              {/* 조회 버튼 */}
              <button
                onClick={handleSearch}
                disabled={loading}
                className="w-full mt-3 h-11 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold rounded-xl flex items-center justify-center gap-2 transition-colors disabled:opacity-70"
              >
                {loading ? (
                  <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                ) : (
                  <><Zap size={16} /> 매물 조회</>
                )}
              </button>
            </div>
            {/* 에러 메시지 */}
            {error && (
              <div className="bg-red-50 text-red-700 p-4 rounded-xl flex items-start gap-3 border border-red-100">
                <AlertCircle size={20} className="shrink-0 mt-0.5" />
                <p className="text-sm leading-relaxed">{error}</p>
              </div>
            )}
            {/* 결과 요약 */}
            {!loading && !error && processedData.shownCount > 0 && (
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div className="bg-white p-4 rounded-xl border border-slate-200 text-center shadow-sm">
                  <div className="text-xs text-slate-500 mb-1">관심 단지 (59㎡형)</div>
                  <div className="text-xl font-bold">{processedData.stats.apts}개</div>
                </div>
                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 text-center shadow-sm">
                  <div className="text-xs text-slate-600 font-medium mb-1 flex items-center justify-center gap-1">
                    <Layers size={14} /> 실거래 건수
                  </div>
                  <div className="text-xl font-bold text-slate-800">{processedData.stats.deduped}건</div>
                </div>
                <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100 text-center shadow-sm">
                  <div className="text-xs text-indigo-600 font-medium mb-1">🔑 전세</div>
                  <div className="text-xl font-bold text-indigo-700">{processedData.stats.jeonse}건</div>
                </div>
                <div className="bg-orange-50 p-4 rounded-xl border border-orange-100 text-center shadow-sm">
                  <div className="text-xs text-orange-600 font-medium mb-1">🏷️ 월세</div>
                  <div className="text-xl font-bold text-orange-700">{processedData.stats.monthly}건</div>
                </div>
              </div>
            )}
            {/* 정렬 토글 */}
            {!loading && !error && processedData.stats.deduped > 0 && (
              <div className="flex gap-2 justify-end">
                <button
                  onClick={() => setSortOrder('transit')}
                  className={`px-3 py-1.5 rounded-full text-xs font-bold border transition-all ${sortOrder === 'transit' ? 'bg-green-600 text-white border-green-600' : 'bg-white text-slate-500 border-slate-300 hover:bg-slate-50'}`}
                >
                  🚇 교통·전세순
                </button>
                <button
                  onClick={() => setSortOrder('recent')}
                  className={`px-3 py-1.5 rounded-full text-xs font-bold border transition-all ${sortOrder === 'recent' ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-500 border-slate-300 hover:bg-slate-50'}`}
                >
                  📅 최근순
                </button>
              </div>
            )}
            {/* 매물 유형 필터 버튼 */}
            {!loading && !error && processedData.stats.deduped > 0 && (
              <div className="flex gap-2">
                {[
                  { label: '전체', count: processedData.stats.deduped, value: '전체', color: 'slate' },
                  { label: '전세', count: processedData.stats.jeonse, value: '전세', color: 'indigo' },
                  { label: '월세', count: processedData.stats.monthly, value: '월세', color: 'orange' },
                ].map(btn => {
                  const active = typeFilter === btn.value;
                  const colorMap = {
                    slate:  active ? 'bg-slate-700 text-white border-slate-700' : 'bg-white text-slate-600 border-slate-200',
                    indigo: active ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-indigo-600 border-indigo-200',
                    orange: active ? 'bg-orange-500 text-white border-orange-500' : 'bg-white text-orange-600 border-orange-200',
                  };
                  return (
                    <button key={btn.value} onClick={() => setTypeFilter(btn.value)}
                      className={`flex-1 py-2.5 rounded-xl text-xs font-bold border transition-all ${colorMap[btn.color]}`}>
                      <div>{btn.label}</div>
                      <div className="text-base font-extrabold">{btn.count}건</div>
                    </button>
                  );
                })}
              </div>
            )}
            {/* 매물 리스트 — 구별(성동구·은평구) 섹션 · 단지별 묶음 (전용 59㎡형) */}
            {!loading && !error && processedData.shownCount > 0 && (
              <div className="space-y-6">
                {processedData.groups.filter(g => g.apts.length > 0).map(group => (
                  <section key={group.code}>
                    <div className="flex items-center flex-wrap gap-2 mb-2 mt-1 sticky top-14 bg-slate-50/95 backdrop-blur py-1.5 z-[5]">
                      <span className="text-base font-extrabold text-slate-800">🏙️ {group.name}</span>
                      <span className="text-xs font-bold text-white bg-blue-600 px-2 py-0.5 rounded-full">{group.aptCount}개 단지</span>
                      <span className="text-[11px] text-slate-400">실거래 {group.dealCount}건 · 전세 {group.jeonse} · 월세 {group.monthly}</span>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {group.apts.map((apt, idx) => {
                  const transit = getTransit(apt.dong);
                  const jeonseDeals = apt.deals.filter(d => d.type === '전세');
                  const minJ = jeonseDeals.length ? Math.min(...jeonseDeals.map(d => d.deposit)) : null;
                  const maxJ = jeonseDeals.length ? Math.max(...jeonseDeals.map(d => d.deposit)) : null;
                  const naverUrl = naverLandUrl(apt.aptName, apt.dong);
                  return (
                    <div key={idx} className={`bg-white rounded-xl border overflow-hidden active:shadow-md transition-shadow flex flex-col ${apt.hasJeonse ? 'border-indigo-300 ring-1 ring-indigo-100' : 'border-slate-200'}`}>
                      {/* 단지 헤더 */}
                      <div className="px-4 pt-3 pb-2 border-b border-slate-100">
                        <div className="flex justify-between items-center mb-1">
                          <h3 className="font-extrabold text-base text-slate-800 truncate" title={apt.aptName}>
                            {apt.aptName}
                          </h3>
                          <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 shrink-0 ml-1">
                            실거래 {apt.dealCount}건
                          </span>
                        </div>
                        <p className="text-xs text-slate-400 flex items-center gap-2 mt-0.5">
                          <span className="flex items-center gap-0.5"><MapPin size={11} /> {apt.dong}</span>
                          <span className="flex items-center gap-0.5"><Building2 size={11} /> 전용 59㎡형</span>
                          {apt.buildYear && <span className="flex items-center gap-0.5"><Calendar size={11} />{apt.buildYear}년식</span>}
                        </p>
                        {minJ !== null && (
                          <div className="mt-1.5 text-sm font-bold text-indigo-700">
                            전세 {minJ === maxJ ? formatPrice(minJ) : `${formatPrice(minJ)} ~ ${formatPrice(maxJ)}`}
                          </div>
                        )}
                        {/* 대중교통 소요시간 */}
                        <div className="flex gap-2 mt-2">
                          <div className={`flex-1 flex items-center justify-center gap-1 text-[11px] font-bold px-2 py-1 rounded-lg ${transit.s <= 20 ? 'bg-green-100 text-green-800' : transit.s <= 30 ? 'bg-blue-100 text-blue-800' : 'bg-slate-100 text-slate-600'}`}>
                            🚇 서울역 <span className="text-sm font-extrabold">약 {transit.s}분</span>
                          </div>
                          <div className={`flex-1 flex items-center justify-center gap-1 text-[11px] font-bold px-2 py-1 rounded-lg ${transit.m <= 15 ? 'bg-green-100 text-green-800' : transit.m <= 25 ? 'bg-blue-100 text-blue-800' : 'bg-slate-100 text-slate-600'}`}>
                            🏢 문정역 <span className="text-sm font-extrabold">약 {transit.m}분</span>
                          </div>
                        </div>
                      </div>
                      {/* 실거래 가격 목록 (같은 단지의 여러 가격) */}
                      <div className="px-4 py-2 flex-1">
                        <div className="text-[11px] text-slate-400 font-semibold mb-1">실거래 내역 (최신순)</div>
                        <ul className="divide-y divide-slate-100">
                          {apt.deals.map((d, di) => {
                            const loanOk = d.type === '전세' && d.deposit <= 70000;
                            return (
                              <li key={di} className="flex items-center justify-between gap-2 py-1.5">
                                <div className="flex items-center gap-1.5 min-w-0">
                                  <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${d.type === '전세' ? 'bg-indigo-100 text-indigo-700' : 'bg-orange-100 text-orange-700'}`}>
                                    {d.type}
                                  </span>
                                  <span className="font-extrabold text-slate-900 text-sm">{formatPrice(d.deposit)}</span>
                                  {d.monthlyRent > 0 && (
                                    <span className="text-orange-600 font-bold text-xs">/{formatPrice(d.monthlyRent)}</span>
                                  )}
                                  {loanOk && <span title="서울시 신혼부부 이자지원 대상" className="text-green-600"><CheckCircle2 size={12} /></span>}
                                </div>
                                <div className="flex items-center gap-2 text-[11px] text-slate-400 shrink-0">
                                  <span>{d.floor}층</span>
                                  <span>{String(d.dealYear || '').slice(2)}.{d.dealMonth}.{d.dealDay}</span>
                                  {d.brokerCount > 1 && (
                                    <span title="동일 가격 거래 건수" className="px-1 rounded bg-slate-100 text-slate-500">×{d.brokerCount}</span>
                                  )}
                                </div>
                              </li>
                            );
                          })}
                        </ul>
                      </div>
                      {/* 네이버 부동산 매물 연동 */}
                      <div className="px-3 pb-3 pt-1">
                        <a href={naverUrl} target="_blank" rel="noopener noreferrer"
                          className="flex items-center justify-center gap-1 py-2 bg-[#03C75A] hover:brightness-95 active:brightness-90 text-white rounded-lg text-xs font-bold transition-all shadow-sm">
                          🏠 네이버 부동산에서 현재 전·월세 매물 보기 →
                        </a>
                      </div>
                    </div>
                  );
                })}
                    </div>
                  </section>
                ))}
              </div>
            )}
            {!loading && !error && processedData.shownCount === 0 && (
              <div className="text-center py-16 text-slate-500 bg-white rounded-xl border border-slate-200">
                <Building2 size={40} className="mx-auto text-slate-300 mb-3" />
                <p className="font-medium">조건에 맞는 관심단지 실거래 내역이 없습니다.</p>
                <p className="text-sm mt-1 text-slate-400">자치구·면적·유형 조건을 조정해보세요.</p>
              </div>
            )}
            {loading && (
              <div className="text-center py-16">
                <div className="w-10 h-10 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-3" />
                <p className="text-sm text-slate-500 font-semibold">관심 자치구 실거래 데이터 조회 중...</p>
                <p className="text-xs text-slate-400 mt-1">성동구·은평구 국토교통부 데이터 조회 중입니다</p>
              </div>
            )}
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
