<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유해인 포트폴리오 - 스마트 실거래가</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* 기본 폰트 설정 (웹 폰트 적용) */
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', sans-serif; }

    /* 로딩 스피너 애니메이션 추가 */
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    // ==========================================
    // 0. API 키 설정 영역
    // ==========================================
    // 이곳에 공공데이터포털에서 발급받은 API 키(Encoding)를 넣으세요.
    // 예: "Your_Secret_Api_Key"
    const DEFAULT_API_KEY = "f754635a661061bda14f6efce95949a04cd8a82a887e474282a76e7404c775ed";
    // ==========================================
    // 1. 아이콘 컴포넌트 (Lucide 아이콘 SVG 구현)
    // ==========================================
    const IconProps = { fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" };
    const Zap = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" {...IconProps}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
    const MapPin = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" {...IconProps}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
    const Building2 = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" {...IconProps}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>;
    const Key = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" {...IconProps}><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>;
    const AlertCircle = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" {...IconProps}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
    const Home = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" {...IconProps}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
    const Calendar = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" {...IconProps}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const Layers = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" {...IconProps}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;
    const CheckCircle2 = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" {...IconProps}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>;
    const Settings = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" {...IconProps}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
    // ==========================================
    // 2. 코어 데이터 및 로직
    // ==========================================
    const SEOUL_GU = {
      '강남구': '11680', '강동구': '11740', '강북구': '11305', '강서구': '11500',
      '관악구': '11620', '광진구': '11215', '구로구': '11530', '금천구': '11545',
      '노원구': '11350', '도봉구': '11320', '동대문구': '11230', '동작구': '11590',
      '마포구': '11440', '서대문구': '11410', '서초구': '11650', '성동구': '11200',
      '성북구': '11290', '송파구': '11710', '양천구': '11470', '영등포구': '11560',
      '용산구': '11170', '은평구': '11380', '종로구': '11110', '중구': '11140',
      '중랑구': '11260',
    };
    function isInvalidKey(key) {
      return !key || key.trim() === '' || key === 'DEMO_KEY' || key === '여기에_발급받은_API_키를_입력하세요';
    }
    async function fetchAptRent(lawdCd, dealYmd, apiKey) {
      if (isInvalidKey(apiKey)) {
        return getDemoData(lawdCd, dealYmd);
      }
      const url = `https://apis.data.go.kr/1613000/RTMSDataSvcAptRent/getRTMSDataSvcAptRent`
        + `?serviceKey=${encodeURIComponent(apiKey)}`
        + `&LAWD_CD=${lawdCd}`
        + `&DEAL_YMD=${dealYmd}`
        + `&numOfRows=1000`
        + `&pageNo=1`;
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const text = await res.text();

        if (text.includes('<returnAuthMsg>')) {
          const errMsg = text.match(/<returnAuthMsg>(.*?)<\/returnAuthMsg>/)?.[1] || '인증 오류';
          throw new Error(`API 키 인증 실패: ${errMsg}`);
        }

        return parseXmlResponse(text);
      } catch (err) {
        console.error('API 호출 오류:', err);
        throw new Error(`API 호출 실패: ${err.message}. API 키를 확인해주세요.`);
      }
    }
    function parseXmlResponse(xml) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, 'text/xml');
      const items = doc.querySelectorAll('item');
      const result = [];
      items.forEach(item => {
        const get = (tag) => item.querySelector(tag)?.textContent?.trim() || '';
        result.push({
          aptName: get('아파트'),
          dong: get('법정동'),
          area: parseFloat(get('전용면적') || '0'),
          deposit: parseInt((get('보증금액') || '0').replace(/,/g, '')),
          monthlyRent: parseInt((get('월세금액') || '0').replace(/,/g, '')),
          floor: get('층'),
          buildYear: get('건축년도'),
          dealYear: get('년'),
          dealMonth: get('월').padStart(2, '0'),
          dealDay: get('일').padStart(2, '0'),
          type: parseInt((get('월세금액') || '0').replace(/,/g, '')) > 0 ? '반전세' : '전세',
        });
      });
      return result;
    }
    function stringSimilarity(a, b) {
      if (!a || !b) return 0;
      const setA = new Set(a.split(''));
      const setB = new Set(b.split(''));
      const intersection = new Set([...setA].filter(x => setB.has(x)));
      const union = new Set([...setA, ...setB]);
      return intersection.size / union.size;
    }
    function deduplicateListings(listings) {
      const groups = new Map();
      listings.forEach(item => {
        const exactKey = `${item.aptName}_${item.dong}_${Math.round(item.area)}_${item.deposit}`;
        if (groups.has(exactKey)) {
          groups.get(exactKey).count += 1;
          return;
        }
        let merged = false;
        for (const [key, group] of groups) {
          const rep = group.rep;
          const nameSim = stringSimilarity(item.aptName, rep.aptName);
          const areaDiff = Math.abs(item.area - rep.area);
          const depositDiff = Math.abs(item.deposit - rep.deposit);
          if (nameSim >= 0.8 && areaDiff <= 3 && depositDiff <= 500) {
            group.count += 1;
            if ((item.dealYear + item.dealMonth + item.dealDay) >
                (rep.dealYear + rep.dealMonth + rep.dealDay)) {
              group.rep = item;
            }
            merged = true;
            break;
          }
        }
        if (!merged) {
          groups.set(exactKey, { rep: item, count: 1 });
        }
      });
      return Array.from(groups.values()).map(g => ({
        ...g.rep,
        brokerCount: g.count,
      }));
    }
    function checkLoanEligibility(deposit) {
      return deposit <= 70000;
    }
    function calcMonthlyInterest(loanAmount) {
      const annualRate = 0.0295;
      return Math.round(loanAmount * annualRate / 12);
    }
    function getDemoData(lawdCd, dealYmd) {
      const guNames = {
        '11680': '역삼동', '11710': '문정동', '11650': '반포동',
        '11440': '마포동', '11380': '불광동', '11200': '행당동',
      };
      const guName = Object.keys(SEOUL_GU).find(key => SEOUL_GU[key] === lawdCd) || '서울시';
      const dong = guNames[lawdCd] || `${guName} ○○동`;
      const apts = ['래미안', '힐스테이트', '푸르지오', 'e편한세상', '자이', '아이파크'];
      const data = [];
      for (let i = 0; i < 45; i++) {
        const name = `${dong.replace('동','')[0]}○○ ${apts[i % apts.length]} ${Math.floor(i/apts.length)+1}단지`;
        const area = [59.97, 74.05, 84.93][i % 3];
        const deposit = 35000 + (i * 2000) + Math.floor(Math.random() * 1000);
        const monthly = i % 4 === 0 ? 50 + i * 5 : 0;

        const isDuplicate = i > 30 && Math.random() > 0.5;

        data.push({
          aptName: isDuplicate ? data[i-15].aptName : name,
          dong: isDuplicate ? data[i-15].dong : dong,
          area: isDuplicate ? data[i-15].area : area,
          deposit: isDuplicate ? data[i-15].deposit : deposit,
          monthlyRent: isDuplicate ? data[i-15].monthlyRent : monthly,
          floor: String(Math.floor(Math.random() * 20) + 1),
          buildYear: String(2000 + (i * 2)),
          dealYear: dealYmd.substring(0, 4),
          dealMonth: dealYmd.substring(4, 6),
          dealDay: String(Math.floor(Math.random() * 28) + 1).padStart(2, '0'),
          type: (isDuplicate ? data[i-15].monthlyRent : monthly) > 0 ? '반전세' : '전세',
        });
      }

      return data.sort(() => Math.random() - 0.5);
    }
    const formatPrice = (price) => {
      if (price === 0) return '0';
      if (price >= 10000) {
        const uk = Math.floor(price / 10000);
        const man = price % 10000;
        return `${uk}억 ${man > 0 ? man.toLocaleString() : ''}`;
      }
      return price.toLocaleString();
    };
    // ==========================================
    // 3. 메인 애플리케이션 UI
    // ==========================================
    function App() {
      const [apiKey, setApiKey] = useState(() => {
        const localKey = localStorage.getItem('molit_api_key');
        if (!localKey && !isInvalidKey(DEFAULT_API_KEY)) {
           return DEFAULT_API_KEY;
        }
        return localKey || '';
      });

      const [showSettings, setShowSettings] = useState(false);

      const [selectedGu, setSelectedGu] = useState('11680');
      const [selectedMonth, setSelectedMonth] = useState(() => {
        const d = new Date();
        d.setMonth(d.getMonth() - 1);
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      });
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [originalListings, setOriginalListings] = useState([]);
      const [isDemoMode, setIsDemoMode] = useState(false);
      const handleSaveApiKey = (e) => {
        const val = e.target.value;
        setApiKey(val);
        localStorage.setItem('molit_api_key', val);
      };
      const handleSearch = async () => {
        setLoading(true);
        setError(null);
        try {
          const dealYmd = selectedMonth.replace('-', '');
          setIsDemoMode(isInvalidKey(apiKey));

          const data = await fetchAptRent(selectedGu, dealYmd, apiKey);
          setOriginalListings(data);
        } catch (err) {
          setError(err.message);
          setOriginalListings([]);
        } finally {
          setLoading(false);
        }
      };
      const processedData = useMemo(() => {
        if (!originalListings || originalListings.length === 0) return { listings: [], stats: {} };

        const deduped = deduplicateListings(originalListings);

        deduped.sort((a, b) => {
          if (a.deposit !== b.deposit) return a.deposit - b.deposit;
          return b.area - a.area;
        });
        const stats = {
          total: originalListings.length,
          deduped: deduped.length,
          removed: originalListings.length - deduped.length,
          loanEligible: deduped.filter(i => checkLoanEligibility(i.deposit)).length
        };
        return { listings: deduped, stats };
      }, [originalListings]);
      useEffect(() => {
        handleSearch();
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);
      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-12">
          {/* 헤더 */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
            <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center gap-2 text-blue-600">
                <Home size={28} className="stroke-[2.5]" />
                <h1 className="text-xl font-bold tracking-tight">유해인 포트폴리오</h1>
              </div>
              <button
                onClick={() => setShowSettings(!showSettings)}
                className="p-2 rounded-full hover:bg-slate-100 text-slate-500 transition-colors"
                title="설정"
              >
                <Settings size={20} />
              </button>
            </div>
          </header>
          <main className="max-w-5xl mx-auto px-4 pt-6 space-y-6">
            {/* 설정 패널 */}
            {showSettings && (
              <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm animate-in fade-in slide-in-from-top-2">
                <h2 className="text-sm font-semibold flex items-center gap-2 mb-3">
                  <Key size={16} className="text-slate-500"/> API 키 설정
                </h2>
                <p className="text-xs text-slate-500 mb-3 leading-relaxed">
                  공공데이터포털의 <strong>'국토교통부_아파트전월세 자료'</strong> 인증키를 입력하세요.<br/>
                  비워두면 <strong>데모 모드(가상 데이터)</strong>로 작동합니다.
                </p>
                <input
                  type="text"
                  value={apiKey}
                  onChange={handleSaveApiKey}
                  placeholder="발급받은 인증키를 입력하세요"
                  className="w-full text-sm p-3 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                />
              </div>
            )}
            {/* 검색 패널 */}
            <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {/* 자치구 선택 */}
                <div className="space-y-1.5">
                  <label className="text-xs font-semibold text-slate-500 flex items-center gap-1.5">
                    <MapPin size={14} /> 자치구
                  </label>
                  <select
                    value={selectedGu}
                    onChange={(e) => setSelectedGu(e.target.value)}
                    className="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                  >
                    {Object.entries(SEOUL_GU).map(([guName, code]) => (
                      <option key={code} value={code}>{guName}</option>
                    ))}
                  </select>
                </div>
                {/* 계약연월 선택 */}
                <div className="space-y-1.5">
                  <label className="text-xs font-semibold text-slate-500 flex items-center gap-1.5">
                    <Calendar size={14} /> 계약연월
                  </label>
                  <input
                    type="month"
                    value={selectedMonth}
                    onChange={(e) => setSelectedMonth(e.target.value)}
                    className="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                  />
                </div>
                {/* 조회(업데이트) 버튼 */}
                <div className="flex items-end">
                  <button
                    onClick={handleSearch}
                    disabled={loading}
                    className="w-full h-[46px] bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg flex items-center justify-center gap-2 transition-colors disabled:opacity-70"
                  >
                    {loading ? (
                      <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                    ) : (
                      <><Zap size={18} /> 업데이트</>
                    )}
                  </button>
                </div>
              </div>
            </div>
            {/* 에러 메시지 */}
            {error && (
              <div className="bg-red-50 text-red-700 p-4 rounded-xl flex items-start gap-3 border border-red-100">
                <AlertCircle size={20} className="shrink-0 mt-0.5" />
                <p className="text-sm leading-relaxed">{error}</p>
              </div>
            )}
            {/* 결과 요약 */}
            {!loading && !error && processedData.listings.length > 0 && (
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div className="bg-white p-4 rounded-xl border border-slate-200 text-center shadow-sm">
                  <div className="text-xs text-slate-500 mb-1">총 수집 매물</div>
                  <div className="text-xl font-bold">{processedData.stats.total}건</div>
                </div>
                <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 text-center shadow-sm">
                  <div className="text-xs text-blue-600 font-medium mb-1 flex items-center justify-center gap-1">
                    <Layers size={14} /> 중복 제거됨
                  </div>
                  <div className="text-xl font-bold text-blue-700">-{processedData.stats.removed}건</div>
                </div>
                <div className="bg-white p-4 rounded-xl border border-slate-200 text-center shadow-sm">
                  <div className="text-xs text-slate-500 mb-1">최종 고유 매물</div>
                  <div className="text-xl font-bold">{processedData.stats.deduped}건</div>
                </div>
                <div className="bg-green-50 p-4 rounded-xl border border-green-100 text-center shadow-sm">
                  <div className="text-xs text-green-700 font-medium mb-1">대출가능 (7억 이하)</div>
                  <div className="text-xl font-bold text-green-800">{processedData.stats.loanEligible}건</div>
                </div>
              </div>
            )}
            {/* 매물 리스트 */}
            {!loading && !error && processedData.listings.length > 0 && (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {processedData.listings.map((item, idx) => {
                  const isLoanEligible = checkLoanEligibility(item.deposit);
                  const loanAmount = isLoanEligible ? item.deposit * 0.8 : 0;
                  const monthlyInterest = isLoanEligible ? calcMonthlyInterest(loanAmount) : 0;
                  return (
                    <div key={idx} className="bg-white rounded-xl border border-slate-200 overflow-hidden hover:shadow-md transition-shadow group flex flex-col">
                      <div className="p-4 border-b border-slate-100 bg-slate-50/50">
                        <div className="flex justify-between items-start mb-2">
                          <span className={`text-xs font-bold px-2 py-1 rounded ${item.type === '전세' ? 'bg-indigo-100 text-indigo-700' : 'bg-orange-100 text-orange-700'}`}>
                            {item.type}
                          </span>
                          {item.brokerCount > 1 && (
                            <span className="text-[11px] font-medium px-2 py-1 rounded-full bg-slate-200 text-slate-600 flex items-center gap-1" title="유사 매물이 중복 접수된 횟수">
                              <Layers size={10} /> 중복 {item.brokerCount}건 통합
                            </span>
                          )}
                        </div>
                        <h3 className="font-bold text-lg text-slate-800 truncate" title={item.aptName}>
                          {item.aptName}
                        </h3>
                        <p className="text-sm text-slate-500 flex items-center gap-1 mt-1">
                          <MapPin size={12} /> {item.dong}
                        </p>
                      </div>
                      <div className="p-4 space-y-4 flex-1">
                        <div>
                          <div className="flex items-end gap-2">
                            <span className="text-xs text-slate-500 font-medium pb-1">보증금</span>
                            <span className="text-2xl font-extrabold tracking-tight text-slate-900">
                              {formatPrice(item.deposit)}
                            </span>
                          </div>
                          {item.monthlyRent > 0 && (
                            <div className="flex items-end gap-2 mt-1">
                              <span className="text-xs text-slate-500 font-medium pb-0.5">월세</span>
                              <span className="text-lg font-bold text-orange-600">
                                {formatPrice(item.monthlyRent)}
                              </span>
                            </div>
                          )}
                        </div>
                        <div className="grid grid-cols-2 gap-y-2 text-sm">
                          <div className="flex items-center gap-1.5 text-slate-600">
                            <div className="w-5 flex justify-center text-slate-400"><Building2 size={14} /></div>
                            {item.area}㎡
                          </div>
                          <div className="flex items-center gap-1.5 text-slate-600">
                            <div className="w-5 flex justify-center text-slate-400"><Layers size={14} /></div>
                            {item.floor}층
                          </div>
                          <div className="flex items-center gap-1.5 text-slate-600">
                            <div className="w-5 flex justify-center text-slate-400"><Calendar size={14} /></div>
                            {item.buildYear}년식
                          </div>
                          <div className="flex items-center gap-1.5 text-slate-500 text-xs">
                            계약일: {item.dealMonth}.{item.dealDay}
                          </div>
                        </div>
                      </div>
                      <div className="p-3 bg-slate-50 border-t border-slate-100">
                        {isLoanEligible ? (
                          <div className="flex flex-col gap-1">
                            <div className="flex items-center justify-between text-xs font-semibold text-green-700">
                              <span className="flex items-center gap-1">
                                <CheckCircle2 size={14} /> 서울시 신혼부부 이자지원 대상
                              </span>
                            </div>
                            <div className="text-[11px] text-slate-500 flex justify-between">
                              <span>예상 대출 80%: {formatPrice(loanAmount)}</span>
                              <span>월 이자 약 {formatPrice(monthlyInterest)}원</span>
                            </div>
                          </div>
                        ) : (
                          <div className="text-xs text-slate-400 text-center py-1">
                            보증금 7억 초과 (서울시 대출지원 제외)
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {!loading && !error && processedData.listings.length === 0 && (
              <div className="text-center py-20 text-slate-500 bg-white rounded-xl border border-slate-200">
                <Building2 size={48} className="mx-auto text-slate-300 mb-4" />
                <p className="text-lg font-medium">해당 조건의 실거래가 내역이 없습니다.</p>
                <p className="text-sm mt-1">다른 자치구나 기간을 선택해보세요.</p>
              </div>
            )}
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
